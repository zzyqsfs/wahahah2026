        let answers = [];

        function startTest() {
            showPage('test');
            renderAllQuestions();

            const ball = document.getElementById('draggableBall');
            if (ball) {
                ball.style.left = 'auto';
                ball.style.top = 'auto';
                ball.style.right = '30px';
                ball.style.bottom = '30px';
            }

            updateBottleFill();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderAllQuestions() {
            const list = document.getElementById('questionsList');
            if (!list) return;

            if (!Array.isArray(answers) || answers.length !== questions.length) {
                answers = new Array(questions.length).fill(undefined);
            }

            list.innerHTML = '';

            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'question question-item';
                card.id = `q-${qIndex}`;

                const title = document.createElement('h3');
                title.textContent = `问题 ${qIndex + 1}：${q.text}`;
                card.appendChild(title);

                const opts = document.createElement('div');
                opts.className = 'options';

                q.options.forEach((opt, optIndex) => {
                    const el = document.createElement('div');
                    el.className = 'option';
                    if (answers[qIndex] === optIndex) el.classList.add('selected');
                    
                    const radio = document.createElement('div');
                    radio.className = 'option-radio';
                    el.appendChild(radio);
                    
                    const text = document.createElement('span');
                    text.className = 'option-text';
                    text.textContent = opt.text;
                    el.appendChild(text);
                    
                    el.onclick = () => selectOption(qIndex, optIndex);
                    opts.appendChild(el);
                });

                card.appendChild(opts);
                list.appendChild(card);
            });
        }

        function selectOption(questionIndex, optionIndex) {
            answers[questionIndex] = optionIndex;

            const card = document.getElementById(`q-${questionIndex}`);
            if (card) {
                const options = card.querySelectorAll('.option');
                options.forEach((opt, idx) => {
                    if (idx === optionIndex) opt.classList.add('selected');
                    else opt.classList.remove('selected');
                });
            }

            updateBottleFill();
        }

        function updateBottleFill() {
            const bottleFill = document.getElementById('bottleFill');
            if (!bottleFill) return;
            const total = questions.length;
            const done = answers.filter(v => v !== undefined).length;
            const progress = total === 0 ? 0 : (done / total) * 100;
            bottleFill.style.height = `${progress}%`;
        }

            showPage('welcome');
            window.scrollTo({ top: 0, behavior: 'smooth' });

        function submitTest() {
            const missingIndex = answers.findIndex(v => v === undefined);
            if (missingIndex !== -1) {
                alert(`还有题目没做完：第 ${missingIndex + 1} 题`);
                const el = document.getElementById(`q-${missingIndex}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                return;

            calculateResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });

                const optionValue = questions[qIndex].options[answerIndex].value;

                } else if (optionValue === "B") {
                    scores[weights[1]] += 3;

                    scores[weights[2]] += 2;
                } else {
                    scores[weights[3]] += 1;
                }
            });

            };
            document.getElementById('resultType').textContent = result.tag;

        function initDraggableBall() {
            const ball = document.getElementById('draggableBall');
            if (!ball) return;

            let isDragging = false;
            let startX, startY, initialX, initialY;

            ball.addEventListener('mousedown', startDrag);
            ball.addEventListener('touchstart', startDrag, { passive: false });

            function startDrag(e) {
                isDragging = true;
                ball.style.cursor = 'grabbing';

                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                const rect = ball.getBoundingClientRect();
                initialX = rect.left;
                initialY = rect.top;

                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, { passive: false });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);

                e.preventDefault();
            }

            function drag(e) {
                if (!isDragging) return;

                let currentX, currentY;
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                const deltaX = currentX - startX;
                const deltaY = currentY - startY;

                ball.style.left = `${initialX + deltaX}px`;
                ball.style.top = `${initialY + deltaY}px`;
                ball.style.right = 'auto';
                ball.style.bottom = 'auto';

                e.preventDefault();
            }

            function stopDrag() {
                isDragging = false;
                ball.style.cursor = 'grab';
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
                constrainToViewport();
            }

            function constrainToViewport() {
                const rect = ball.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width;
                const maxY = window.innerHeight - rect.height;

                if (rect.left > maxX) ball.style.left = `${maxX}px`;
                if (rect.top > maxY) ball.style.top = `${maxY}px`;
                if (rect.left < 0) ball.style.left = '0px';
                if (rect.top < 0) ball.style.top = '0px';
            }

            window.addEventListener('resize', constrainToViewport);
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', initDraggableBall);
    </script>
